<!DOCTYPE html>
<html lang="en">
<head>
   <title>@ryan3000 | Home</title>
    <link rel="icon" href="../media/alert.png" type="image/x-icon">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="../mixed.css">
    <script src="../scripts.js" defer ></script>
    <script src="../elements.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="@ryan3000 | Home" />
    <meta property="og:description" content="Welcome to the @ryan3000 site! You can submit tips, view stats & more!" />
    <meta name="theme-color" content="#0F8B8D">
</head>
<body>

   <site-header></site-header>

     <form id="contact-form">
  <input type="text" id="name" placeholder="Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <textarea id="message" placeholder="Message"></textarea>
  <button type="submit">Send</button>
</form>


     <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
     <script>
const supabaseUrl = "https://amwbrhntevyesphzcmrd.supabase.co";
const supabaseKey = "sb_publishable_4VUoksVlPWJAVJdf3h-TVQ_IvCsp8PO";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById("contact-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const { data, error } = await supabaseClient
    .from("submittions")
    .insert([
      { name: name, email: email, message: message }
    ]);

  if (error) {
    alert("Error sending message");
    console.log(error);
  } else {
    alert("Message sent!");
  }
});
        
</script>    
   </body>
 </html>
